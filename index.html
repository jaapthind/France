<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thind Vacations - Interactive Journey</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='none' stroke='%23ffffff' stroke-width='6' stroke-dasharray='10 5'/><path d='M50 20l5 15h15l-12 9 5 15-13-10-13 10 5-15-12-9h15z' fill='%23ffffff'/><text x='50%' y='80%' dominant-baseline='middle' text-anchor='middle' font-size='12' font-family='sans-serif' fill='%23ffffff' letter-spacing='1'>TRAVEL</text></svg>">
    
    <style>
        /* ==========================================================================
           1. CSS VARIABLES & THEME CONFIGURATION
           ========================================================================== */
        :root {
            /* Liquid Glass / Mica Aesthetics */
            --mica-bg: rgba(255, 255, 255, 0.05);
            --mica-border: rgba(255, 255, 255, 0.15);
            --mica-highlight: rgba(255, 255, 255, 0.25);
            --mica-shadow-light: 0 4px 24px rgba(0, 0, 0, 0.1);
            --mica-shadow-heavy: 0 12px 40px rgba(0, 0, 0, 0.4);
            --mica-blur: blur(24px);
            --mica-saturation: saturate(180%);
            

            /* Typography */
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --text-accent: #a1c4fd;

            /* Spacing & Layout */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-xxl: 64px;
            
            /* Border Radii */
            --border-radius-sm: 8px;
            --border-radius-md: 16px;
            --border-radius-lg: 24px;
            --border-radius-pill: 9999px;

            /* Transitions */
            --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --duration-fast: 0.2s;
            --duration-normal: 0.4s;
            --duration-slow: 0.8s;
            
            /* Rainbow Gradient Colors for the Blurbs */
            --rainbow-1: #ff0055;
            --rainbow-2: #ffaa00;
            --rainbow-3: #55ff00;
            --rainbow-4: #00aaff;
            --rainbow-5: #aa00ff;
        }

        /* ==========================================================================
           2. RESET & BASE STYLES
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background-color: #050505;
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Custom Scrollbar for Webkit */
        ::-webkit-scrollbar {
            width: 12px;
            background: rgba(0, 0, 0, 0.8);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            border: 3px solid rgba(0, 0, 0, 0.8); /* Creates padding effect */
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* ==========================================================================
           3. BACKGROUND LIQUID CANVAS
           ========================================================================== */
        #liquid-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            opacity: 0.85;
        }

        /* ==========================================================================
           4. TYPOGRAPHY
           ========================================================================== */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: var(--spacing-md);
        }

        .gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, var(--text-accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-huge {
            font-size: clamp(3rem, 6vw, 7rem);
            letter-spacing: -0.04em;
            text-align: center;
            margin: var(--spacing-xxl) 0 var(--spacing-sm);
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .subtitle {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            color: var(--text-muted);
            text-align: center;
            max-width: 700px;
            margin: 0 auto var(--spacing-xxl);
            font-weight: 300;
        }

        /* ==========================================================================
           5. LIQUID GLASS / MICA UTILITIES
           ========================================================================== */
        .glass-panel {
            background: var(--mica-bg);
            backdrop-filter: var(--mica-blur) var(--mica-saturation);
            -webkit-backdrop-filter: var(--mica-blur) var(--mica-saturation);
            border: 1px solid var(--mica-border);
            box-shadow: var(--mica-shadow-light);
            border-radius: var(--border-radius-lg);
            position: relative;
            overflow: hidden; /* Essential for containing the rainbow blurbs */
        }

        /* ✨ THE RAINBOW MOVING BLURBS BEHIND THE GLASS PANELS ✨ */
        .glass-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                var(--rainbow-1),
                var(--rainbow-2),
                var(--rainbow-3),
                var(--rainbow-4),
                var(--rainbow-5),
                var(--rainbow-1)
            );
            filter: blur(60px);
            opacity: 0.12; /* Subtle but visible */
            z-index: 0;
            animation: spinRainbow 12s linear infinite;
            pointer-events: none;
            transition: opacity var(--duration-normal) var(--ease-smooth);
        }

        .glass-panel:hover::before {
            opacity: 0.25; /* Brightens up on hover */
            animation-duration: 6s; /* Speeds up on hover */
        }

        @keyframes spinRainbow {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* Ensure content sits above the rainbow blob */
        .glass-panel > * {
            position: relative;
            z-index: 1;
        }

        /* Generic Glass Button */
        .glass-button {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: var(--border-radius-pill);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--duration-fast) var(--ease-smooth);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            white-space: nowrap;
        }

        .glass-button:hover, 
        .glass-button.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .glass-button:active {
            transform: translateY(1px);
        }

        /* ==========================================================================
           6. RESPONSIVE NAVIGATION & "MORE" MENU LOGIC
           ========================================================================== */
        .site-header {
            position: sticky;
            top: 20px;
            z-index: 100;
            margin: 0 auto;
            width: 100%;
            max-width: 1200px;
            padding: 0 var(--spacing-md);
        }

        .nav-container {
            display: flex;
            align-items: center;
            padding: var(--spacing-sm);
            border-radius: var(--border-radius-pill);
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            width: 100%;
        }

        .nav-visible-items {
            display: flex;
            flex-wrap: nowrap;
            overflow: hidden;
            gap: var(--spacing-sm);
            flex-grow: 1;
        }

        .nav-more-container {
            position: relative;
            margin-left: var(--spacing-sm);
            display: none; /* Hidden by default, toggled by JS */
        }
        
        .nav-more-container.active {
            display: block;
        }

        .more-dropdown {
            position: absolute;
            top: calc(100% + 15px);
            right: 0;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: var(--border-radius-md);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            padding: var(--spacing-sm);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            min-width: 200px;
            
            /* Animation properties */
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all var(--duration-fast) var(--ease-spring);
        }

        .nav-more-container.open .more-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .more-dropdown .glass-button {
            width: 100%;
            justify-content: flex-start;
            border-radius: var(--border-radius-sm);
        }

        /* Caret icon for more button */
        .caret {
            transition: transform var(--duration-fast) var(--ease-spring);
            display: inline-block;
        }
        .nav-more-container.open .caret {
            transform: rotate(180deg);
        }

        /* ==========================================================================
           7. MAIN LAYOUT & GALLERY GRID
           ========================================================================== */
        .main-container {
            max-width: 1800px; /* Expanded for ultra-wide displays */
            margin: 0 auto;
            padding: var(--spacing-lg);
            min-height: 85vh;
        }

        .tab-section {
            display: none;
            opacity: 0;
            transform: translateY(30px) scale(0.98);
            transition: opacity var(--duration-slow) var(--ease-smooth),
                        transform var(--duration-slow) var(--ease-smooth);
        }

        .tab-section.active {
            display: block;
        }

        .tab-section.fade-in {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .section-header {
            text-align: center;
            margin-bottom: var(--spacing-xxl);
            padding-top: var(--spacing-xl);
        }

        /* Dynamic CSS Grid for Masonry-like appearance */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            grid-auto-rows: 300px;
            gap: var(--spacing-lg);
            padding-bottom: var(--spacing-xxl);
        }

        .gallery-item {
            position: relative;
            border-radius: var(--border-radius-md);
            overflow: hidden;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
            /* Transform for staggered grid look */
            transition: transform var(--duration-normal) var(--ease-spring),
                        box-shadow var(--duration-normal) var(--ease-smooth);
        }

        /* Utility classes for grid spanning created dynamically in JS */
        .span-row-2 { grid-row: span 2; }
        .span-col-2 { grid-column: span 2; }
        
        /* Mobile Adaptations for Grid */
        @media (max-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                grid-auto-rows: 250px;
                gap: var(--spacing-md);
            }
        }
        
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr; /* Single column on small mobile */
                grid-auto-rows: 350px;
            }
            .span-col-2 { grid-column: span 1; }
            .span-row-2 { grid-row: span 1; }
            
            .title-huge {
                font-size: clamp(2.5rem, 8vw, 4rem);
            }
        }

        .gallery-item:hover {
            transform: scale(1.03) translateY(-8px);
            box-shadow: var(--mica-shadow-heavy);
            z-index: 2;
        }

        /* Inner glass reflection line */
        .gallery-item::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 5;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
            /* Ensure the image is visually above the rainbow blur but below the reflection */
            position: relative; 
            z-index: 2;
        }

        .gallery-item:hover img {
            transform: scale(1.12);
        }

        .item-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 40%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: var(--spacing-lg);
            opacity: 0;
            transition: opacity var(--duration-normal) var(--ease-smooth);
            z-index: 10;
        }

        .gallery-item:hover .item-overlay {
            opacity: 1;
        }
        
        /* Mobile Overlay Always Visible slightly */
        @media (hover: none) {
            .item-overlay {
                opacity: 1;
                background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 40%, transparent 100%);
            }
            .item-title, .item-desc {
                transform: translateY(0) !important;
            }
        }

        .item-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            transform: translateY(20px);
            transition: transform var(--duration-normal) var(--ease-spring);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .item-desc {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: var(--spacing-sm);
            transform: translateY(20px);
            transition: transform var(--duration-normal) var(--ease-spring);
            transition-delay: 0.05s;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .gallery-item:hover .item-title,
        .gallery-item:hover .item-desc {
            transform: translateY(0);
        }

        /* SVG Placeholder Generator styles */
        .placeholder-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
            color: rgba(255,255,255,0.2);
            position: relative;
            z-index: 2;
        }
        .placeholder-wrap svg {
            width: 80px;
            height: 80px;
            opacity: 0.2;
            transition: transform 0.8s ease;
        }
        
        .gallery-item:hover .placeholder-wrap svg {
            transform: scale(1.2) rotate(10deg);
        }

        /* ==========================================================================
           8. FULLSCREEN LIGHTBOX
           ========================================================================== */
        .lightbox-container {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--duration-normal) var(--ease-smooth);
        }

        .lightbox-container.active {
            opacity: 1;
            pointer-events: all;
        }

        .lightbox-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-img-wrapper {
            position: relative;
            max-width: 90vw;
            max-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(0.9);
            transition: transform var(--duration-normal) var(--ease-spring);
        }

        .lightbox-container.active .lightbox-img-wrapper {
            transform: scale(1);
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: var(--border-radius-md);
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            object-fit: contain;
            user-select: none;
        }

        /* Lightbox Controls */
        .lb-ctrl {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: all var(--duration-fast);
            z-index: 10000;
        }

        .lb-ctrl:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        
        .lb-ctrl:active {
            transform: scale(0.95);
        }

        .lb-close {
            top: 32px;
            right: 32px;
            width: 56px;
            height: 56px;
        }

        .lb-prev, .lb-next {
            top: 50%;
            transform: translateY(-50%);
            width: 64px;
            height: 64px;
        }

        .lb-prev:hover, .lb-next:hover {
            transform: translateY(-50%) scale(1.15);
        }
        
        .lb-prev:active, .lb-next:active {
            transform: translateY(-50%) scale(0.95);
        }

        .lb-prev { left: 32px; }
        .lb-next { right: 32px; }

        .lb-info {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: var(--spacing-md) var(--spacing-xl);
            border-radius: var(--border-radius-pill);
            text-align: center;
            min-width: 350px;
            max-width: 90vw;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .lb-info h3 { 
            margin-bottom: 6px; 
            font-size: 1.4rem; 
            color: #fff;
        }
        
        .lb-info p { 
            color: var(--text-muted); 
            font-size: 1rem; 
            margin: 0; 
            line-height: 1.4;
        }

        @media (max-width: 768px) {
            .lb-prev, .lb-next { display: none; } /* Rely on swipe for mobile */
            .lb-close { top: 16px; right: 16px; width: 44px; height: 44px; }
            .lb-info { 
                bottom: 20px; 
                width: 92vw; 
                border-radius: var(--border-radius-md); 
                padding: var(--spacing-md);
            }
            .lightbox-img { max-height: 75vh; }
        }

        /* ==========================================================================
           9. LOADING INDICATOR
           ========================================================================== */
        .loader {
            width: 64px;
            height: 64px;
            border: 4px solid rgba(255,255,255,0.05);
            border-radius: 50%;
            border-top-color: var(--text-accent);
            border-bottom-color: var(--rainbow-1);
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin: 150px auto;
            display: none;
            box-shadow: 0 0 20px rgba(161, 196, 253, 0.4);
        }
        
        .loader.active {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <canvas id="liquid-canvas"></canvas>

    <header class="site-header">
        <nav class="nav-container" id="main-nav">
            <div class="nav-visible-items" id="nav-visible">
                </div>
            
            <div class="nav-more-container" id="nav-more">
                <button class="glass-button more-btn" id="more-btn">
                    More <span class="caret">▼</span>
                </button>
                <div class="more-dropdown" id="more-dropdown">
                    </div>
            </div>
        </nav>
    </header>

    <main class="main-container">
        <div class="section-header">
            <h1 class="title-huge gradient-text">Thind Vacations</h1>
            <p class="subtitle">An architectural, historical, and visual family journey across the globe.</p>
        </div>

        <div id="loader" class="loader"></div>
        
        <div id="tabs-container">
            </div>
    </main>

    <div class="lightbox-container" id="lightbox">
        <div class="lb-ctrl lb-close" id="lb-close">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </div>
        <div class="lb-ctrl lb-prev" id="lb-prev">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        </div>
        <div class="lb-ctrl lb-next" id="lb-next">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </div>
        
        <div class="lightbox-content" id="lb-content">
            <div class="lightbox-img-wrapper">
                <img src="" alt="Fullscreen View" class="lightbox-img" id="lb-img">
            </div>
            <div class="lb-info">
                <h3 id="lb-title">Image Title</h3>
                <p id="lb-desc">Image description goes here.</p>
                <p id="lb-counter" style="font-size: 0.85rem; margin-top: 10px; opacity: 0.6; font-weight: 600; letter-spacing: 2px;">1 / 10</p>
            </div>
        </div>
    </div>

    <script>
        /**
         * ========================================================================
         * 🛠️ HOW TO ADD A NEW TAB OR IMAGE (SUPER EASY)
         * ========================================================================
         * * 1. ADDING A TAB (COUNTRY/TRIP):
         * Simply add a new object to the `TRIP_DATA` array below.
         * Give it an `id`, `name`, `subtitle`, and an array of `images`.
         * * * 2. ADDING AN IMAGE:
         * Inside any city's `images` array, add a new object:
         * {
         * src: "URL_OR_PATH_TO_IMAGE.jpg",
         * title: "Title of Image",
         * desc: "Description of Image",
         * size: "normal" // options: "normal", "large" (2x2 grid), "tall" (2 rows), "wide" (2 cols)
         * }
         * * * NOTE: If `src` is left empty "", the system automatically generates 
         * a beautiful Glassmorphic placeholder for you based on the title!
         * ========================================================================
         */

        const TRIP_DATA = [
            {
                id: "overview",
                name: "Overview",
                subtitle: "Global highlights from the Thind family adventures.",
                images: [

        /* ==========================================================================
           CORE APPLICATION CLASS
           ========================================================================== */
        class ThindVacationsApp {
            constructor(data) {
                this.data = data;
                this.currentTabId = data[0].id; // Default to first tab
                
                // Cache DOM elements
                this.dom = {
                    navVisible: document.getElementById('nav-visible'),
                    navMoreContainer: document.getElementById('nav-more'),
                    moreBtn: document.getElementById('more-btn'),
                    moreDropdown: document.getElementById('more-dropdown'),
                    tabsContainer: document.getElementById('tabs-container'),
                    loader: document.getElementById('loader')
                };
                
                // Lightbox state tracking
                this.lightbox = {
                    active: false,
                    images: [],
                    currentIndex: 0,
                    elements: {
                        container: document.getElementById('lightbox'),
                        img: document.getElementById('lb-img'),
                        title: document.getElementById('lb-title'),
                        desc: document.getElementById('lb-desc'),
                        counter: document.getElementById('lb-counter'),
                        close: document.getElementById('lb-close'),
                        prev: document.getElementById('lb-prev'),
                        next: document.getElementById('lb-next')
                    }
                };

                this.init();
            }

            init() {
                this.buildTabs();
                this.buildResponsiveNavigation();
                this.setupLightbox();
                this.switchTab(this.currentTabId);
                this.initLiquidBackground();
                
                // Bind dropdown toggle
                this.dom.moreBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.dom.navMoreContainer.classList.toggle('open');
                });
                
                // Close dropdown when clicking outside
                document.addEventListener('click', () => {
                    this.dom.navMoreContainer.classList.remove('open');
                });
            }

            /* --- UI BUILDERS --- */

            buildResponsiveNavigation() {
                // Clear existing
                this.dom.navVisible.innerHTML = '';
                this.dom.moreDropdown.innerHTML = '';
                
                // Create all buttons and store them in an array
                this.navButtons = this.data.map(tab => {
                    const btn = document.createElement('button');
                    btn.className = 'glass-button';
                    btn.dataset.target = tab.id;
                    
                    // Assign icon based on string matching for flavor
                    let iconSVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>`;
                    
                    if(tab.name.toLowerCase().includes('overview')) {
                        iconSVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>`;
                    } else if (tab.name.toLowerCase().includes('france')) {
                        iconSVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>`;
                    } else if (tab.name.toLowerCase().includes('yucatan')) {
                        iconSVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 22h20L12 2z"></path><path d="M12 22V11"></path></svg>`;
                    }

                    btn.innerHTML = `${iconSVG} ${tab.name}`;
                    
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation(); // prevent dropdown close if inside dropdown
                        this.switchTab(tab.id);
                        this.dom.navMoreContainer.classList.remove('open');
                    });
                    
                    return btn;
                });

                // Initial render: put all in visible container to measure
                this.navButtons.forEach(btn => this.dom.navVisible.appendChild(btn));

                // Wait for DOM to paint, then calculate layout
                requestAnimationFrame(() => {
                    this.calculateNavLayout();
                });

                // Recalculate on window resize
                window.addEventListener('resize', () => {
                    // Debounce resize
                    clearTimeout(this.resizeTimer);
                    this.resizeTimer = setTimeout(() => {
                        this.calculateNavLayout();
                    }, 100);
                });
            }

            calculateNavLayout() {
                // Reset: move all back to visible container
                this.navButtons.forEach(btn => this.dom.navVisible.appendChild(btn));
                this.dom.navMoreContainer.classList.remove('active');
                
                const navContainerWidth = this.dom.navVisible.parentElement.clientWidth;
                // Padding + More button approx width + buffer
                const moreBtnWidth = 120; 
                const availableWidth = navContainerWidth - 40; 
                
                let currentWidth = 0;
                let overflowIndex = -1;

                // Check widths
                const children = Array.from(this.dom.navVisible.children);
                for (let i = 0; i < children.length; i++) {
                    // Get width including margin/gap (approx +16px gap)
                    currentWidth += children[i].offsetWidth + 16; 
                    
                    // If we exceed width (leaving room for 'More' button just in case)
                    if (currentWidth > availableWidth) {
                        overflowIndex = i;
                        // If we are overflowing, we need to subtract the previous items
                        // to make sure there's room for the "More" button itself.
                        // Standard practice is to break one item early if tight.
                        if (currentWidth - children[i].offsetWidth + moreBtnWidth > availableWidth && i > 0) {
                            overflowIndex = i - 1;
                        }
                        break;
                    }
                }

                // If overflow detected, move items to dropdown
                if (overflowIndex !== -1 && overflowIndex < children.length) {
                    this.dom.navMoreContainer.classList.add('active');
                    
                    // Move overflowing buttons to dropdown
                    const overflowingButtons = children.slice(overflowIndex);
                    overflowingButtons.forEach(btn => {
                        this.dom.moreDropdown.appendChild(btn);
                    });
                }
            }

            buildTabs() {
                this.data.forEach(tab => {
                    // Create section container
                    const section = document.createElement('section');
                    section.className = 'tab-section';
                    section.id = `tab-${tab.id}`;

                    // Create header
                    const header = document.createElement('div');
                    header.className = 'section-header';
                    header.innerHTML = `
                        <h2>${tab.name}</h2>
                        <p class="subtitle" style="margin-bottom:0;">${tab.subtitle}</p>
                    `;
                    
                    // Create Grid
                    const grid = document.createElement('div');
                    grid.className = 'gallery-grid';

                    // Populate Grid with Images
                    tab.images.forEach((imgData, index) => {
                        const item = document.createElement('div');
                        item.className = 'glass-panel gallery-item';
                        
                        // Apply size utilities based on configuration
                        if(imgData.size === 'large') item.classList.add('span-col-2', 'span-row-2');
                        else if(imgData.size === 'wide') item.classList.add('span-col-2');
                        else if(imgData.size === 'tall') item.classList.add('span-row-2');

                        // Generate image source or placeholder
                        const finalSrc = imgData.src && imgData.src.trim() !== "" 
                            ? imgData.src 
                            : this.generatePlaceholderURI(imgData.title);

                        item.innerHTML = `
                            <img src="${finalSrc}" alt="${imgData.title}" loading="lazy">
                            <div class="item-overlay">
                                <h3 class="item-title">${imgData.title}</h3>
                                <p class="item-desc">${imgData.desc}</p>
                            </div>
                        `;

                        // Bind lightbox click event via closure
                        item.addEventListener('click', () => this.openLightbox(tab.id, index));
                        grid.appendChild(item);
                    });

                    section.appendChild(header);
                    section.appendChild(grid);
                    this.dom.tabsContainer.appendChild(section);
                });
            }

            /**
             * Helper to generate a colorful SVG placeholder if no image URL is provided.
             * Creates a geometric abstract design based on the title hash.
             */
            generatePlaceholderURI(text) {
                // Generate a pseudo-random hash based on string length and char codes
                let hash = 0;
                for (let i = 0; i < text.length; i++) hash = text.charCodeAt(i) + ((hash << 5) - hash);
                
                // Map hash to beautiful hues
                const hue1 = Math.abs(hash % 360);
                const hue2 = (hue1 + 60) % 360; // Analogous color
                
                // SVG markup for a beautiful placeholder
                const svg = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
                        <defs>
                            <linearGradient id="grad${hash}" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:hsl(${hue1}, 50%, 25%);stop-opacity:1" />
                                <stop offset="100%" style="stop-color:hsl(${hue2}, 70%, 10%);stop-opacity:1" />
                            </linearGradient>
                            <pattern id="pattern${hash}" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
                                <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.05)"/>
                            </pattern>
                        </defs>
                        <rect width="100%" height="100%" fill="url(#grad${hash})" />
                        <rect width="100%" height="100%" fill="url(#pattern${hash})" />
                        
                        <g transform="translate(400,400)">
                            <circle cx="0" cy="0" r="150" fill="rgba(255,255,255,0.03)" />
                            <circle cx="0" cy="0" r="180" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2" stroke-dasharray="10 10"/>
                            <circle cx="0" cy="0" r="120" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4" />
                            
                            ${hash % 2 === 0 
                                ? `<path d="M-50,-50 L50,-50 L0,50 Z" fill="rgba(255,255,255,0.1)" />` 
                                : `<rect x="-40" y="-40" width="80" height="80" rx="10" fill="rgba(255,255,255,0.1)" transform="rotate(45)" />`
                            }
                        </g>
                    </svg>
                `;
                return `data:image/svg+xml;base64,${btoa(svg)}`;
            }

            /* --- NAVIGATION LOGIC --- */

            switchTab(tabId) {
                this.currentTabId = tabId;
                
                // Update Nav Buttons (Active state)
                this.navButtons.forEach(btn => {
                    if(btn.dataset.target === tabId) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });

                // Update "More" button style if active tab is inside the dropdown
                const isDropdownActive = Array.from(this.dom.moreDropdown.children).some(btn => btn.dataset.target === tabId);
                if (isDropdownActive) {
                    this.dom.moreBtn.classList.add('active');
                    this.dom.moreBtn.style.borderColor = "var(--text-accent)";
                } else {
                    this.dom.moreBtn.classList.remove('active');
                    this.dom.moreBtn.style.borderColor = "";
                }

                // Hide all sections
                const sections = this.dom.tabsContainer.querySelectorAll('.tab-section');
                sections.forEach(sec => {
                    sec.classList.remove('active', 'fade-in');
                });

                // Show loader briefly to simulate processing/fetching layout
                this.dom.loader.classList.add('active');
                
                // Small timeout for smooth transition
                setTimeout(() => {
                    this.dom.loader.classList.remove('active');
                    const activeSection = document.getElementById(`tab-${tabId}`);
                    if(activeSection) {
                        activeSection.classList.add('active');
                        // Trigger reflow for CSS animation
                        void activeSection.offsetWidth; 
                        activeSection.classList.add('fade-in');
                    }
                }, 400); // 400ms delay feels premium
            }

            /* --- LIGHTBOX LOGIC --- */

            setupLightbox() {
                const lb = this.lightbox.elements;
                
                lb.close.addEventListener('click', () => this.closeLightbox());
                lb.next.addEventListener('click', () => this.navigateLightbox(1));
                lb.prev.addEventListener('click', () => this.navigateLightbox(-1));
                
                // Close on background click
                lb.container.addEventListener('click', (e) => {
                    if (e.target === lb.container || e.target.classList.contains('lightbox-content') || e.target.classList.contains('lightbox-img-wrapper')) {
                        this.closeLightbox();
                    }
                });

                // Keyboard Support (Esc to close, arrows to navigate)
                document.addEventListener('keydown', (e) => {
                    if (!this.lightbox.active) return;
                    if (e.key === 'Escape') this.closeLightbox();
                    if (e.key === 'ArrowRight') this.navigateLightbox(1);
                    if (e.key === 'ArrowLeft') this.navigateLightbox(-1);
                });

                // Swipe Support for Mobile Lightbox
                let touchStartX = 0;
                let touchEndX = 0;
                
                lb.container.addEventListener('touchstart', e => {
                    touchStartX = e.changedTouches[0].screenX;
                }, {passive: true});
                
                lb.container.addEventListener('touchend', e => {
                    touchEndX = e.changedTouches[0].screenX;
                    this.handleSwipe(touchStartX, touchEndX);
                }, {passive: true});
            }

            handleSwipe(start, end) {
                const threshold = 60; // Pixels required to trigger swipe
                if (end < start - threshold) this.navigateLightbox(1); // Swipe left -> Next
                if (end > start + threshold) this.navigateLightbox(-1); // Swipe right -> Prev
            }

            openLightbox(tabId, imageIndex) {
                // Find tab data
                const tabData = this.data.find(t => t.id === tabId);
                if(!tabData) return;

                this.lightbox.images = tabData.images;
                this.lightbox.currentIndex = imageIndex;
                this.lightbox.active = true;
                
                this.updateLightboxContent();
                this.lightbox.elements.container.classList.add('active');
                
                // Lock background scroll when lightbox is open
                document.body.style.overflow = 'hidden'; 
            }

            closeLightbox() {
                this.lightbox.active = false;
                this.lightbox.elements.container.classList.remove('active');
                
                // Restore background scroll
                document.body.style.overflow = ''; 
                
                // Clear source after fade out to prevent visual glitch on next open
                setTimeout(() => {
                    this.lightbox.elements.img.src = '';
                }, 400); // Matches CSS transition duration
            }

            navigateLightbox(direction) {
                let newIndex = this.lightbox.currentIndex + direction;
                const total = this.lightbox.images.length;
                
                // Loop around array boundaries
                if (newIndex >= total) newIndex = 0;
                if (newIndex < 0) newIndex = total - 1;
                
                this.lightbox.currentIndex = newIndex;
                
                // Quick fade out/in effect for image change
                const imgWrap = document.querySelector('.lightbox-img-wrapper');
                imgWrap.style.transform = `scale(0.95) translateX(${direction * -20}px)`;
                imgWrap.style.opacity = '0';
                
                setTimeout(() => {
                    this.updateLightboxContent();
                    imgWrap.style.transform = `scale(1) translateX(0px)`;
                    imgWrap.style.opacity = '1';
                }, 250);
            }

            updateLightboxContent() {
                const lb = this.lightbox.elements;
                const imgData = this.lightbox.images[this.lightbox.currentIndex];
                
                // Use placeholder logic if src is missing
                const finalSrc = imgData.src && imgData.src.trim() !== "" 
                    ? imgData.src 
                    : this.generatePlaceholderURI(imgData.title);

                // Update DOM elements
                lb.img.src = finalSrc;
                lb.title.textContent = imgData.title;
                lb.desc.textContent = imgData.desc;
                lb.counter.textContent = `${this.lightbox.currentIndex + 1} / ${this.lightbox.images.length}`;
            }

            /* --- LIQUID BACKGROUND ANIMATION (WEBGL/CANVAS FALLBACK) --- */
            
            initLiquidBackground() {
                const canvas = document.getElementById('liquid-canvas');
                const ctx = canvas.getContext('2d');
                let width, height;
                let particles = [];
                
                const resize = () => {
                    width = canvas.width = window.innerWidth;
                    height = canvas.height = window.innerHeight;
                };
                window.addEventListener('resize', resize);
                resize();

                class Particle {
                    constructor() {
                        this.x = Math.random() * width;
                        this.y = Math.random() * height;
                        this.radius = Math.random() * 300 + 150; // Extra large blobs
                        this.vx = (Math.random() - 0.5) * 0.4;
                        this.vy = (Math.random() - 0.5) * 0.4;
                        
                        // Select colors from a deep, space/liquid palette
                        const colors = [
                            'rgba(10, 20, 30, 0.7)',
                            'rgba(25, 40, 50, 0.6)',
                            'rgba(40, 60, 80, 0.5)',
                            'rgba(60, 100, 140, 0.2)', // Accent blue
                            'rgba(80, 40, 90, 0.15)'  // Accent purple
                        ];
                        this.color = colors[Math.floor(Math.random() * colors.length)];
                    }

                    update() {
                        this.x += this.vx;
                        this.y += this.vy;

                        // Soft bounce off edges
                        if (this.x < -this.radius || this.x > width + this.radius) this.vx *= -1;
                        if (this.y < -this.radius || this.y > height + this.radius) this.vy *= -1;
                    }

                    draw(ctx) {
                        ctx.beginPath();
                        const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                        gradient.addColorStop(0, this.color);
                        gradient.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = gradient;
                        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // Initialize 20 blobs for a rich background
                for (let i = 0; i < 20; i++) {
                    particles.push(new Particle());
                }

                const animate = () => {
                    // Clear with dark transparent background for slight motion blur effect
                    ctx.fillStyle = 'rgba(5, 5, 5, 0.9)';
                    ctx.fillRect(0, 0, width, height);

                    particles.forEach(p => {
                        p.update();
                        p.draw(ctx);
                    });

                    requestAnimationFrame(animate);
                };

                animate();
            }
        }

        // Boot the application once DOM is entirely ready
        document.addEventListener('DOMContentLoaded', () => {
            const app = new ThindVacationsApp(TRIP_DATA);
            
            // Add a slight 3D Parallax effect to cards based on mouse movement
            document.addEventListener('mousemove', (e) => {
                // Only target items currently being hovered
                const cards = document.querySelectorAll('.gallery-item:hover');
                if(!cards.length) return;
                
                const card = cards[0];
                const rect = card.getBoundingClientRect();
                
                // Calculate mouse position relative to card center
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                // Calculate rotation (max 6 degrees)
                const rotateX = ((y - centerY) / centerY) * -6;
                const rotateY = ((x - centerX) / centerX) * 6;
                
                // Apply transform
                card.style.transform = `perspective(1200px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.03, 1.03, 1.03) translateY(-8px)`;
            });
            
            // Reset transform smoothly on mouse leave
            document.addEventListener('mouseout', (e) => {
                // Check if we left a gallery item
                const target = e.target.closest('.gallery-item');
                if(target) {
                    target.style.transform = ''; // Removes inline style, falling back to CSS rules
                }
            });
        });

    </script>
